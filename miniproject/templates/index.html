<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Hotel Review Sentiment Analysis</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #a7580f);
            overflow: hidden;
        }

        /* container */

        .container {
            width: 600px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            color: white;
            animation: fadeIn 1.5s ease;
        }

        /* animation */

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            margin-bottom: 15px;
            font-size: 28px;
        }

        p {
            margin-bottom: 25px;
            opacity: 0.8;
        }

        /* textarea */

        textarea {
            width: 100%;
            height: 120px;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-size: 16px;
            resize: none;
            outline: none;
            margin-top: 10px;
        }

        /* button */

        button {
            margin-top: 20px;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
        }

        /* loading animation */

        .loader {
            display: none;
            margin-top: 20px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-left: auto;
            margin-right: auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* result */

        .result {
            margin-top: 30px;
            font-size: 24px;
            font-weight: bold;
        }

        .positive {
            color: #00ff9d;
        }

        .neutral {
            color: #ffd166;
        }

        .negative {
            color: #ff4b5c;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Hotel Review Sentiment Analysis</h1>
        <p>Analyze customer sentiment using AI</p>

        <form method="post" onsubmit="showLoader()">

            {% csrf_token %}

            <textarea name="review" placeholder="Write your hotel review here..."></textarea>

            <br>

            <button type="submit">Analyze Sentiment</button>

        </form>

        <div class="loader" id="loader"></div>

        {% if prediction %}

        <div class="result">

            {% if prediction == "Positive" %}

            <span class="positive">😊 Positive Review</span>

            {% elif prediction == "Neutral" %}

            <span class="neutral">😐 Neutral Review</span>

            {% else %}

            <span class="negative">😡 Negative Review</span>

            {% endif %}

        </div>

        {% endif %}

    </div>

    <script>

        function showLoader() {
            document.getElementById("loader").style.display = "block";
        }

    </script>

</body>

</html>
